<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>

<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #141e30, #243b55);
        font-family: Arial, sans-serif;
    }

    .player {
        background: #fff;
        width: 350px;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    }

    h2 {
        margin-bottom: 5px;
    }

    #artist {
        color: gray;
        margin-bottom: 15px;
    }

    .controls button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        background: #243b55;
        color: white;
        transition: 0.3s;
    }

    .controls button:hover {
        background: #141e30;
    }

    input[type="range"] {
        width: 100%;
        margin: 10px 0;
    }

    .time {
        font-size: 14px;
        margin-bottom: 10px;
    }

    .playlist {
        text-align: left;
        margin-top: 15px;
        max-height: 100px;
        overflow-y: auto;
    }

    .playlist div {
        padding: 5px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
    }

    .playlist div:hover {
        background: #f0f0f0;
    }

    .active {
        background: #d1e7ff;
    }
</style>
</head>
<body>

<div class="player">
    <h2 id="title">Song Title</h2>
    <p id="artist">Artist</p>

    <audio id="audio"></audio>

    <!-- Progress -->
    <input type="range" id="progress" value="0">
    <div class="time">
        <span id="current">0:00</span> /
        <span id="duration">0:00</span>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="playPause()" id="playBtn">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <!-- Volume -->
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">

    <!-- Playlist -->
    <div class="playlist" id="playlist"></div>
</div>

<script>
    const songs = [
        { title: "Song 1", artist: "Arijit Singh", src: "song1.mp3" },
        { title: "Song 2", artist: "Neha Kakkar", src: "song2.mp3" },
        { title: "Song 3", artist: "Arman Malik", src: "song3.mp3" }
    ];

    const audio = document.getElementById("audio");
    const title = document.getElementById("title");
    const artist = document.getElementById("artist");
    const progress = document.getElementById("progress");
    const current = document.getElementById("current");
    const duration = document.getElementById("duration");
    const volume = document.getElementById("volume");
    const playlist = document.getElementById("playlist");
    const playBtn = document.getElementById("playBtn");

    let songIndex = 0;

    function loadSong(index) {
        const song = songs[index];
        title.innerText = song.title;
        artist.innerText = song.artist;
        audio.src = song.src;
        updatePlaylist();
    }

    function playPause() {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = "⏸";
        } else {
            audio.pause();
            playBtn.innerText = "▶";
        }
    }

    function nextSong() {
        songIndex = (songIndex + 1) % songs.length;
        loadSong(songIndex);
        audio.play();
        playBtn.innerText = "⏸";
    }

    function prevSong() {
        songIndex = (songIndex - 1 + songs.length) % songs.length;
        loadSong(songIndex);
        audio.play();
        playBtn.innerText = "⏸";
    }

    audio.addEventListener("timeupdate", () => {
        if (!audio.duration) return;
        progress.value = (audio.currentTime / audio.duration) * 100;

        let min = Math.floor(audio.currentTime / 60);
        let sec = Math.floor(audio.currentTime % 60);
        if (sec < 10) sec = "0" + sec;
        current.innerText = min + ":" + sec;

        let dMin = Math.floor(audio.duration / 60);
        let dSec = Math.floor(audio.duration % 60);
        if (dSec < 10) dSec = "0" + dSec;
        duration.innerText = dMin + ":" + dSec;
    });

    progress.addEventListener("input", () => {
        audio.currentTime = (progress.value / 100) * audio.duration;
    });

    volume.addEventListener("input", () => {
        audio.volume = volume.value;
    });

    audio.addEventListener("ended", nextSong);

    function updatePlaylist() {
        playlist.innerHTML = "";
        songs.forEach((song, index) => {
            const div = document.createElement("div");
            div.innerText = song.title + " - " + song.artist;
            if (index === songIndex) div.classList.add("active");
            div.onclick = () => {
                songIndex = index;
                loadSong(songIndex);
                audio.play();
                playBtn.innerText = "⏸";
            };
            playlist.appendChild(div);
        });
    }

    loadSong(songIndex);
</script>

</body>
</html>
