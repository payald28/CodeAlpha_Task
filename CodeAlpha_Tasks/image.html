<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f0f2f5;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h2 {
        margin: 30px 0 10px 0;
        text-align: center;
    }

    /* Gallery Container */
    .gallery-container {
        width: 90%;
        max-width: 1100px;
        margin-bottom: 40px;
    }

    /* Grid Layout */
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .gallery img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .gallery img:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* Lightbox */
    .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.9);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    .lightbox img {
        max-width: 85%;
        max-height: 75%;
        border-radius: 10px;
        transition: 0.3s;
    }

    .lightbox-controls {
        margin-top: 20px;
    }

    .lightbox-controls button {
        padding: 10px 20px;
        margin: 0 10px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: white;
        transition: 0.3s;
    }

    .lightbox-controls button:hover {
        background: #ddd;
    }

    .close-btn {
        position: absolute;
        top: 25px;
        right: 35px;
        font-size: 35px;
        color: white;
        cursor: pointer;
    }

</style>
</head>
<body>

<h2>My Image Gallery</h2>

<div class="gallery-container">
    <div class="gallery">
        <img src="https://picsum.photos/id/1015/600/400" onclick="openLightbox(0)">
        <img src="https://picsum.photos/id/1016/600/400" onclick="openLightbox(1)">
        <img src="https://picsum.photos/id/1018/600/400" onclick="openLightbox(2)">
        <img src="https://picsum.photos/id/1020/600/400" onclick="openLightbox(3)">
        <img src="https://picsum.photos/id/1024/600/400" onclick="openLightbox(4)">
        <img src="https://picsum.photos/id/1027/600/400" onclick="openLightbox(5)">
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" style="display:none;">
    <span class="close-btn" onclick="closeLightbox()">×</span>
    <img id="lightbox-img">
    <div class="lightbox-controls">
        <button onclick="prevImage()">⏮ Previous</button>
        <button onclick="nextImage()">Next ⏭</button>
    </div>
</div>

<script>
    const images = [
        "https://picsum.photos/id/1015/900/600",
        "https://picsum.photos/id/1016/900/600",
        "https://picsum.photos/id/1018/900/600",
        "https://picsum.photos/id/1020/900/600",
        "https://picsum.photos/id/1024/900/600",
        "https://picsum.photos/id/1027/900/600"
    ];

    let currentIndex = 0;

    function openLightbox(index) {
        currentIndex = index;
        document.getElementById("lightbox-img").src = images[currentIndex];
        document.getElementById("lightbox").style.display = "flex";
    }

    function closeLightbox() {
        document.getElementById("lightbox").style.display = "none";
    }

    function nextImage() {
        currentIndex = (currentIndex + 1) % images.length;
        document.getElementById("lightbox-img").src = images[currentIndex];
    }

    function prevImage() {
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        document.getElementById("lightbox-img").src = images[currentIndex];
    }

    document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
    });
</script>

</body>
</html>
